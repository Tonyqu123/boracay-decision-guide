<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>6 题测试 | 长滩岛住哪里？</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-page="quiz">
    <header class="site-header">
      <a class="brand" href="../">长滩岛住哪里</a>
      <a class="header-link" href="../">返回首页</a>
    </header>

    <main class="page-shell">
      <section class="page-title-block">
        <p class="eyebrow">Quiz</p>
        <h1>先回答 6 个问题</h1>
        <p>每题只能选一个。结果会先给你免费基础结论，再决定要不要解锁完整住宿决策卡。</p>
      </section>

      <section class="quiz-panel" aria-label="住宿区域问卷">
        <div class="progress-row">
          <span id="progressText">0 / 6</span>
          <div class="progress-track" aria-hidden="true">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </div>

        <form id="quizForm" class="quiz-form"></form>

        <div class="actions">
          <button id="resetButton" class="ghost-button" type="button">重选</button>
          <button id="resultButton" class="primary-button" type="button" disabled>
            生成基础结果
          </button>
        </div>
      </section>
    </main>

    <script src="../data/boracay-hotels.js"></script>
    <script src="../app.js"></script>
  </body>
</html>
